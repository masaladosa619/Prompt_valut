spring.application.name=demo
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
jwt.secretKey=${jwt_secret_key}

spring.security.oauth2.client.registration.google.client-id=1234
spring.security.oauth2.client.registration.google.client-secret==1234

spring.security.oauth2.client.registration.github.client-id=${github_client_id}
spring.security.oauth2.client.registration.github.client-secret=${github_client_secret}

spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.google.redirect-uri=https://promptvalut-production.up.railway.app/login/oauth2/code/github 